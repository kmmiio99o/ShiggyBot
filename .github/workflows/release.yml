name: Release

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  publish:
    name: ${{ matrix.rid }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rid: [win-x64, linux-x64, osx-x64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Read version
        id: version
        run: echo "VERSION=$(cat VERSION | tr -d '\n')" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: |
          dotnet publish -c Release \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:UseAppHost=true \
            -r ${{ matrix.rid }} \
            -o publish

      - name: Bundle
        run: |
          mkdir -p bundle
          cp publish/ShiggyBot* bundle/
          cp config.example.txt bundle/
          cd bundle
          zip -r ../ShiggyBot-${{ matrix.rid }}.zip .

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ShiggyBot-${{ matrix.rid }}
          path: ShiggyBot-${{ matrix.rid }}.zip

  release:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: ShiggyBot-*
          merge-multiple: true

      - name: Read version
        id: version
        run: echo "VERSION=$(cat VERSION | tr -d '\n')" >> "$GITHUB_OUTPUT"

      - name: Write release notes
        run: |
          cat > release-notes.md << 'EOF'
          **Requirements**

          Create a `config.txt` file next to the executable with your bot token:

          ```
          # Discord bot token (required)
          DISCORD_TOKEN=your_token_here

          # Command prefix (default: S)
          PREFIX=S
          ```

          A `config.example.txt` is included in the archive — rename and edit it.
          Alternatively, set the `DISCORD_TOKEN` environment variable.

          ---

          **What's included**

          - Single-file self-contained executable (no .NET runtime needed)
          - `config.example.txt`
          EOF

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.version.outputs.VERSION }}"
          if gh release view "$TAG" > /dev/null 2>&1; then
            gh release edit "$TAG" --notes-file release-notes.md
            gh release upload "$TAG" ShiggyBot-*.zip --clobber
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file release-notes.md \
              --target "${{ github.sha }}" \
              ShiggyBot-*.zip
          fi
