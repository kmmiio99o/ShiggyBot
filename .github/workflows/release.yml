name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  publish:
    name: ${{ matrix.rid }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rid: [win-x64, linux-x64, osx-x64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Read version
        id: version
        run: echo "VERSION=$(cat VERSION | tr -d '\n')" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: |
          dotnet publish -c Release \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:UseAppHost=true \
            -r ${{ matrix.rid }} \
            -o publish

      - name: Bundle
        run: |
          mkdir -p bundle
          cp publish/ShiggyBot* bundle/
          cp config.example.txt bundle/
          cd bundle
          zip -r ../ShiggyBot-${{ matrix.rid }}.zip .

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ShiggyBot-${{ matrix.rid }}
          path: ShiggyBot-${{ matrix.rid }}.zip

  release:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: ShiggyBot-*
          merge-multiple: true

      - name: Read version
        id: version
        run: echo "VERSION=$(cat VERSION | tr -d '\n')" >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.version.outputs.VERSION }}" \
            --title "v${{ steps.version.outputs.VERSION }}" \
            --target "${{ github.sha }}" \
            ShiggyBot-*.zip
