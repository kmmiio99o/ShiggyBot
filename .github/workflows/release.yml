name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  publish:
    name: ${{ matrix.rid }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rid: [win-x64, linux-x64, osx-x64]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish
        run: |
          dotnet publish -c Release \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:UseAppHost=true \
            -r ${{ matrix.rid }} \
            -o publish

      - name: Bundle
        run: |
          mkdir -p bundle
          cp publish/ShiggyBot* bundle/
          cp config.example.txt bundle/
          cd bundle
          zip -r ../ShiggyBot-${{ matrix.rid }}.zip .

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ShiggyBot-${{ matrix.rid }}
          path: ShiggyBot-${{ matrix.rid }}.zip

  release:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: ShiggyBot-*
          merge-multiple: true

      - name: Read version
        run: |
          echo "VERSION=$(cat VERSION)" >> $GITHUB_ENV

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          body: >
            **ShiggyBot v${{ env.VERSION }}**

            Self-contained Discord bot built with .NET 10 and Discord.Net 3.20.1.


            ## ⚙️ Configuration

            Config is loaded from these sources (later overrides earlier):
              1. `appsettings.json` (optional, next to the executable)
              2. Environment variables
              3. `config.txt` (optional, INI-style `KEY=VALUE`, `#` comments)

            A `config.example.txt` is included in the archive. Rename it to `config.txt`
            and edit with your values.

            ### Required

            | Key | Description |
            |-----|-------------|
            | `DISCORD_TOKEN` | Your bot token from the [Discord Developer Portal](https://discord.com/developers/applications) |
            | `PREFIX` | `S` | Command prefix |

            ### Optional

            | Key | Default | Description |
            |-----|---------|-------------|
            | `WELCOME_ROLE_ID` | — | Role ID assigned to new members on join |
            | `PRESENCE_STATUS` | `online` | Bot status (`online`, `idle`, `dnd`, `invisible`) |
            | `PRESENCE_INTERVAL` | `300` | Presence rotation interval in seconds |
            | `LOG_WEBHOOK_URL` | — | Discord webhook URL for error logging |
            | `HF_TOKEN` | — | Hugging Face API token for AI commands (`Sai`) |
            | `GITHUB_TOKEN` | — | GitHub personal access token (higher API rate limits) |
            | `GITHUB_REPO` | — | GitHub repo for commit/PR/star monitoring (`owner/repo`) |
            | `GITHUB_WEBHOOK_CHANNEL_ID` | — | Discord channel ID for GitHub notifications |
            | `DEV_GUILD_ID` | — | Guild ID for development commands |


            ## 📦 What's included

            - **Single-file executable** — self-contained, no .NET runtime needed
            - **SQLite database** (`shiggybot.db`) — created automatically on first run for timed bans,
              disabled commands, and guild config
            - **`config.example.txt`** — template configuration file


            ## 🔧 System requirements

            - **Windows x64**, **Linux x64**, or **macOS x64**
            - No .NET runtime required (self-contained)
            - Network access to `discord.com` and `api.github.com`


            ## 🆕 What's new in v${{ env.VERSION }}

          files: ShiggyBot-*.zip
          generate_release_notes: true
